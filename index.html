<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Horario Astro Soft | Lector PDF</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        :root {
            --primary: #FFD60A; /* Amarillo USACH */
            --dark: #111;
            --gray: #f5f5f7;
            --text: #333;
            --border: #eaeaea;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #ffffff; /* Fondo blanco */
            margin: 0; padding: 20px;
            color: var(--text);
            display: flex; flex-direction: column; align-items: center;
        }

        /* ZONA DE CARGA DEL PDF */
        .upload-zone {
            background: #fff;
            width: 100%; max-width: 800px;
            border: 2px dashed #ccc;
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 30px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--dark);
            background: rgba(255, 214, 10, 0.05);
        }

        .upload-title {
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            font-size: 1.4rem;
            color: var(--dark);
            margin-bottom: 10px;
        }

        .upload-desc { font-size: 0.9rem; color: #666; }
        
        input[type="file"] { display: none; }

        .btn-upload {
            background: var(--dark); color: var(--primary);
            font-family: 'Oswald', sans-serif; font-size: 1rem; text-transform: uppercase;
            padding: 10px 24px; border: none; border-radius: 8px;
            margin-top: 15px; cursor: pointer;
        }

        /* TABLA DEL HORARIO */
        .schedule-container {
            width: 100%; max-width: 800px; /* Tamaño reducido */
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            overflow: hidden;
            border: 1px solid var(--border);
            display: none; /* Se oculta hasta cargar el PDF */
        }

        table { width: 100%; border-collapse: collapse; text-align: center; }
        th { 
            background: var(--dark); color: var(--primary); 
            font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 1px;
            padding: 8px 5px; font-weight: 400; font-size: 0.9rem;
        }
        
        td { border: 1px solid var(--border); padding: 5px; vertical-align: middle; width: 16.6%; }
        td.time-col { 
            background: var(--gray); font-family: 'Oswald', sans-serif; font-size: 0.8rem; 
            color: var(--dark); width: 10%; 
        }

        /* TARJETA DE ASIGNATURA DENTRO DE LA TABLA */
        .class-card {
            background: rgba(255, 214, 10, 0.15); 
            border-left: 4px solid var(--primary);
            padding: 5px;
            border-radius: 6px;
            font-size: 0.75rem;
            display: inline-block;
            width: 90%;
            text-align: left;
            line-height: 1.2;
            margin-bottom: 3px;
        }

        .class-code { font-weight: 700; color: var(--dark); display: block; margin-bottom: 2px; font-size: 0.75rem;}
        .class-room { font-size: 0.7rem; color: #555; display: flex; align-items: center; gap: 4px;}

    </style>
</head>
<body>

    <label class="upload-zone" id="dropZone">
        <div class="upload-title">📄 Horario USACH</div>
        <div class="upload-desc">Haz clic o arrastra tu PDF aquí para generar tu horario! </div>
        <button class="btn-upload" onclick="document.getElementById('pdfInput').click()">Seleccionar PDF</button>
        <input type="file" id="pdfInput" accept=".pdf">
    </label>

    <div class="schedule-container" id="scheduleUI">
        <table id="scheduleTable">
            <thead>
                <tr>
                    <th>Bloque</th>
                    <th>Lunes</th>
                    <th>Martes</th>
                    <th>Miércoles</th>
                    <th>Jueves</th>
                    <th>Viernes</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>

<script>
    // Configurar el worker de PDF.js
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    const fileInput = document.getElementById('pdfInput');
    const scheduleUI = document.getElementById('scheduleUI');
    const tbody = document.querySelector('#scheduleTable tbody');

    const modulos = [
        "08:15 - 09:35", "09:50 - 11:10", "11:25 - 12:45", 
        "13:45 - 15:05", "15:20 - 16:40", "16:55 - 18:15"
    ];

    // EL DICCIONARIO AHORA EMPIEZA VACÍO. SE LLENARÁ SOLO AL LEER EL PDF.
    let nombresRamos = {};

    function initGrid() {
        tbody.innerHTML = '';
        modulos.forEach((mod, index) => {
            let tr = document.createElement('tr');
            tr.innerHTML = `<td class="time-col">B${index+1}<br>${mod}</td>
                            <td id="cell-0-${index}"></td>
                            <td id="cell-1-${index}"></td>
                            <td id="cell-2-${index}"></td>
                            <td id="cell-3-${index}"></td>
                            <td id="cell-4-${index}"></td>`;
            tbody.appendChild(tr);
        });
    }

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file || file.type !== 'application/pdf') {
            alert('Por favor sube un archivo PDF válido.');
            return;
        }

        initGrid(); 
        const reader = new FileReader();

        reader.onload = function(evt) {
            const typedarray = new Uint8Array(evt.target.result);
            
            pdfjsLib.getDocument(typedarray).promise.then(pdf => {
                return pdf.getPage(1);
            }).then(page => {
                return page.getTextContent();
            }).then(textContent => {
                // AQUÍ OCURRE LA MAGIA DE EXTRAER LOS DATOS
                const myClasses = procesarPDF(textContent.items);
                renderClasses(myClasses);
                
                scheduleUI.style.display = 'block'; 
                document.getElementById('dropZone').style.display = 'none'; 
            });
        };
        reader.readAsArrayBuffer(file);
    });

    // LECTOR DINÁMICO (NO NECESITA MEMORIZAR NADA, SOLO LEE Y USA MAYÚSCULAS)
    function procesarPDF(items) {
        let myClasses = [];
        nombresRamos = {}; 

        // Limpia el texto
        let texts = items.map(i => i.str.replace(/\s+/g, ' ').trim()).filter(i => i.length > 0);
        let textoCompleto = texts.join(" ");

        // Extraer Salas
        let rooms = {};
        const roomRegex = /([0-9]{5}-[0-9])-([A-Z0-9\-]+?)[-\s]*Sala:\s*([A-Z0-9]+)/ig;
        let m1;
        while ((m1 = roomRegex.exec(textoCompleto)) !== null) {
            let code = m1[1];
            let coord = m1[2].replace(/-/g, ''); 
            rooms[`${code}-${coord}`] = m1[3];
        }

        let currentCode = null;
        let currentCoord = null;
        const dayMap = { 'L': 0, 'M': 1, 'W': 2, 'J': 3, 'V': 4 }; // Lunes a Viernes

        for (let i = 0; i < texts.length; i++) {
            let txt = texts[i];

            // Busca el código y el nombre del ramo (Guarda el nombre en MAYÚSCULAS)
            let mixedMatch1 = txt.match(/^([0-9]{5}-[0-9])[\s]+(.+)$/);
            let mixedMatch2 = txt.match(/^(.+)[\s]+([0-9]{5}-[0-9])$/);
            
            if (mixedMatch1) {
                currentCode = mixedMatch1[1];
                nombresRamos[currentCode] = mixedMatch1[2].toUpperCase();
                continue;
            } else if (mixedMatch2) {
                currentCode = mixedMatch2[2];
                nombresRamos[currentCode] = mixedMatch2[1].toUpperCase();
                continue;
            }

            let codeMatch = txt.match(/^([0-9]{5}-[0-9])$/);
            if (codeMatch) {
                currentCode = codeMatch[1];
                let nextTxt = texts[i+1] || "";
                let prevTxt = texts[i-1] || "";
                
                if (nextTxt && !nextTxt.match(/^[A-Z]-[0-9]+$/) && !nextTxt.match(/^[A-Z]$/) && !nextTxt.match(/^[0-9\.-]+$/)) {
                    nombresRamos[currentCode] = nextTxt.toUpperCase();
                } else if (prevTxt && !prevTxt.match(/^[0-9]+$/)) {
                    nombresRamos[currentCode] = prevTxt.toUpperCase();
                }
                continue;
            }

            // Busca Coordenadas (ej: T-1)
            let coordMatch = txt.match(/^([A-Z]-[0-9]+)$/);
            if (coordMatch) {
                currentCoord = coordMatch[1].replace(/-/g, '');
                continue;
            }

            // Busca los días de la semana y bloques (ej: L4, M6W6)
            let scheduleMatch = txt.match(/^([LMWJV][1-9])+$/);
            if (scheduleMatch && currentCode) {
                let horario = txt;
                let room = rooms[`${currentCode}-${currentCoord}`] || "POR ASIGNAR";
                
                const horRegex = /([LMWJV])([1-9])/g;
                let hMatch;
                while ((hMatch = horRegex.exec(horario)) !== null) {
                    let dayChar = hMatch[1];
                    let blockNum = parseInt(hMatch[2]);
                    
                    // Solo agrega si el bloque existe en nuestra tabla (1 a 6)
                    if (dayMap[dayChar] !== undefined && blockNum <= modulos.length) {
                        myClasses.push({
                            day: dayMap[dayChar],
                            block: blockNum - 1, 
                            code: currentCode,
                            room: room
                        });
                    }
                }
            }
        }
        return myClasses;
    }

    // Dibuja las tarjetas en la tabla
    function renderClasses(classesArray) {
        classesArray.forEach(cls => {
            const cell = document.getElementById(`cell-${cls.day}-${cls.block}`);
            const nombreRamo = nombresRamos[cls.code] || `CURSO ${cls.code}`; // Usa el nombre dinámico
            
            if (cell) {
                // Se agrega += por si hay más de un ramo en el mismo bloque (apilables)
                cell.innerHTML += `
                    <div class="class-card">
                        <span class="class-code">${nombreRamo}</span>
                        <span class="class-room">📍 ${cls.room}</span>
                    </div>
                `;
            }
        });
    }
</script>

</body>
</html>
