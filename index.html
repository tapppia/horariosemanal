<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Horario Astro Soft | Lector PDF</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        :root {
            --primary: #FFD60A; 
            --dark: #111;
            --gray: #f5f5f7;
            --text: #333;
            --border: #eaeaea;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #fafafa;
            margin: 0; padding: 20px;
            color: var(--text);
            display: flex; flex-direction: column; align-items: center;
        }

        .upload-zone {
            background: #fff;
            width: 100%; max-width: 800px;
            border: 2px dashed #ccc;
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 30px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--dark);
            background: rgba(255, 214, 10, 0.05);
        }

        .upload-title {
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            font-size: 1.4rem;
            color: var(--dark);
            margin-bottom: 10px;
        }

        .upload-desc { font-size: 0.9rem; color: #666; }
        input[type="file"] { display: none; }

        .btn-upload {
            background: var(--dark); color: var(--primary);
            font-family: 'Oswald', sans-serif; font-size: 1rem; text-transform: uppercase;
            padding: 10px 24px; border: none; border-radius: 8px;
            margin-top: 15px; cursor: pointer;
        }

        .schedule-container {
            width: 100%; max-width: 1000px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            overflow: hidden;
            border: 1px solid var(--border);
            display: none; 
            flex-direction: column;
            align-items: center;
        }

        table { width: 100%; border-collapse: collapse; text-align: center; }
        
        th { 
            background: var(--primary); 
            color: var(--dark); 
            font-family: 'Oswald', sans-serif; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            padding: 15px 10px; 
            font-weight: 500; 
            font-size: 1.05rem;
            border: none; 
        }
        
        td { border: 1px solid var(--border); padding: 12px 5px; vertical-align: middle; width: 14%; height: 70px;}
        td.time-col { 
            background: var(--gray); font-family: 'Oswald', sans-serif; font-size: 0.9rem; 
            color: var(--dark); width: 10%; border-right: 1px solid var(--border);
        }

        .class-card {
            background: rgba(255, 214, 10, 0.15);
            border-left: 4px solid var(--primary);
            padding: 8px;
            border-radius: 6px;
            font-size: 0.85rem;
            display: inline-block;
            width: 90%;
            text-align: left;
            line-height: 1.3;
        }

        .class-code { font-weight: 700; color: var(--dark); display: block; margin-bottom: 3px; }
        .class-room { font-size: 0.75rem; color: #555; display: block;}

        .btn-reset {
            background: transparent; color: #d32f2f; border: 1px solid #d32f2f;
            padding: 8px 16px; border-radius: 6px; cursor: pointer;
            font-family: 'Inter', sans-serif; font-size: 0.85rem;
            margin: 15px; transition: 0.2s;
        }
        .btn-reset:hover { background: #d32f2f; color: #fff; }

    </style>
</head>
<body>

    <label class="upload-zone" id="dropZone">
        <div class="upload-title">📄 Generador de Horario Universal</div>
        <div class="upload-desc">Sube tu PDF de inscripción de asignaturas.<br><b>El sistema extraerá tus ramos y guardará tu horario automáticamente.</b></div>
        <button class="btn-upload" onclick="document.getElementById('pdfInput').click()">Seleccionar PDF</button>
        <input type="file" id="pdfInput" accept=".pdf">
    </label>

    <div class="schedule-container" id="scheduleUI">
        <table id="scheduleTable">
            <thead>
                <tr>
                    <th>Bloque</th><th>Lunes</th><th>Martes</th><th>Miércoles</th><th>Jueves</th><th>Viernes</th><th>Sábado</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
        <button class="btn-reset" onclick="borrarMemoria()">Cargar un PDF distinto</button>
    </div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    const fileInput = document.getElementById('pdfInput');
    const scheduleUI = document.getElementById('scheduleUI');
    const dropZone = document.getElementById('dropZone');
    const tbody = document.querySelector('#scheduleTable tbody');

    // Módulos USACH actualizados hasta el bloque 7
    const modulos = [
        "08:15 - 09:35", "09:50 - 11:10", "11:25 - 12:45", 
        "13:45 - 15:05", "15:20 - 16:40", "16:55 - 18:15", 
        "18:30 - 19:50"
    ];
    
    let nombresRamos = {};

    window.onload = function() {
        initGrid();
        const savedData = localStorage.getItem('astroHorarioSaved');
        const savedNames = localStorage.getItem('astroRamosSaved');
        
        if (savedData && savedNames) {
            nombresRamos = JSON.parse(savedNames);
            dropZone.style.display = 'none';
            scheduleUI.style.display = 'flex';
            renderSavedData(JSON.parse(savedData));
        }
    }

    function initGrid() {
        tbody.innerHTML = '';
        modulos.forEach((mod, index) => {
            let tr = document.createElement('tr');
            tr.innerHTML = `<td class="time-col">B${index+1}<br>${mod}</td>
                            <td id="cell-0-${index}"></td><td id="cell-1-${index}"></td>
                            <td id="cell-2-${index}"></td><td id="cell-3-${index}"></td>
                            <td id="cell-4-${index}"></td><td id="cell-5-${index}"></td>`;
            tbody.appendChild(tr);
        });
    }

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file || file.type !== 'application/pdf') return alert('Sube un PDF válido.');

        const reader = new FileReader();
        reader.onload = function(evt) {
            const typedarray = new Uint8Array(evt.target.result);
            pdfjsLib.getDocument(typedarray).promise.then(pdf => pdf.getPage(1))
            .then(page => page.getTextContent())
            .then(textContent => {
                
                const myClasses = procesarPDFMagico(textContent.items);
                
                localStorage.setItem('astroHorarioSaved', JSON.stringify(myClasses));
                localStorage.setItem('astroRamosSaved', JSON.stringify(nombresRamos));
                
                dropZone.style.display = 'none';
                scheduleUI.style.display = 'flex';
                renderSavedData(myClasses);
            });
        };
        reader.readAsArrayBuffer(file);
    });

    // Función para poner bonito el texto (Mayúsculas y minúsculas correctas)
    function formatoNombre(str) {
        const words = str.toLowerCase().split(/\s+/);
        return words.map((word, i) => {
            if (['i', 'ii', 'iii', 'iv', 'v'].includes(word)) return word.toUpperCase();
            if (['a', 'de', 'la', 'el', 'en', 'y', 'las', 'los'].includes(word) && i !== 0) return word;
            return word.charAt(0).toUpperCase() + word.slice(1);
        }).join(' ');
    }

    function procesarPDFMagico(items) {
        let textoCompleto = items.map(i => i.str).join(" ");
        let myClasses = [];
        nombresRamos = {}; 

        // PASO 1: Extraer SALAS de la tabla inferior (ej. 27014-0-T1- Sala: FIS621)
        let rooms = {};
        const roomRegex = /([0-9]{5}-[0-9])-([A-Z0-9]+)[-\s]*Sala:\s*([A-Z0-9]+)/ig;
        let m1;
        while ((m1 = roomRegex.exec(textoCompleto)) !== null) {
            rooms[`${m1[1]}-${m1[2]}`] = m1[3];
        }

        // PASO 2: Extraer RAMOS y CÓDIGOS DE HORARIO (L4, M6W6) de la tabla superior
        const rowRegex = /(?:([0-9]{5}-[0-9])\s+([A-ZÁÉÍÓÚÑ0-9 ,\.-]+?)|([A-ZÁÉÍÓÚÑ0-9 ,\.-]+?)\s+([0-9]{5}-[0-9]))\s+([A-Z]-[0-9])\s+[A-Z]\s+(?:\d-\d-\d|\d)\s+([LMWJVS0-9]*)/g;
        const dayMap = { 'L': 0, 'M': 1, 'W': 2, 'J': 3, 'V': 4, 'S': 5 };
        
        let m2;
        while ((m2 = rowRegex.exec(textoCompleto)) !== null) {
            let code = m2[1] || m2[4];
            let rawName = m2[2] || m2[3];
            let coord = m2[5];     // ej. T-1
            let horario = m2[6];   // ej. M6W6

            // Limpiar nombre (quita el número de lista al inicio si lo agarró) y darle formato
            let cleanName = rawName.replace(/^\d+\s+/, '').trim();
            nombresRamos[code] = formatoNombre(cleanName);

            // Conectar con la sala (Transforma "T-1" en "T1" para buscar en el diccionario de salas)
            let cleanCoord = coord.replace('-', '');
            let room = rooms[`${code}-${cleanCoord}`] || "Por asignar";

            // Traducir el código de horario a coordenadas para la tabla visual
            if (horario) {
                const horRegex = /([LMWJVS])([1-9])/g;
                let hMatch;
                while ((hMatch = horRegex.exec(horario)) !== null) {
                    let dayChar = hMatch[1];
                    let blockNum = parseInt(hMatch[2]);
                    
                    myClasses.push({
                        day: dayMap[dayChar],
                        block: blockNum - 1, // Nuestro código empieza a contar desde 0
                        code: code,
                        room: room
                    });
                }
            }
        }
        return myClasses;
    }

    function renderSavedData(classesArray) {
        initGrid(); 
        classesArray.forEach(cls => {
            const cell = document.getElementById(`cell-${cls.day}-${cls.block}`);
            const nombreRamo = nombresRamos[cls.code] || `Ramo ${cls.code}`;
            if (cell) {
                // Si la celda está vacía, la crea. Si no, la apila (para evitar reemplazar si hay choques de horario)
                const cardHTML = `
                    <div class="class-card" style="margin-top:2px;">
                        <span class="class-code">${nombreRamo}</span>
                        <span class="class-room">${cls.room}</span>
                    </div>`;
                cell.innerHTML += cardHTML;
            }
        });
    }

    function borrarMemoria() {
        localStorage.removeItem('astroHorarioSaved');
        localStorage.removeItem('astroRamosSaved');
        scheduleUI.style.display = 'none';
        dropZone.style.display = 'block';
        fileInput.value = ""; 
    }
</script>

</body>
</html>
