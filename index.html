<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Horario Astro | Lector PDF</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        :root {
            --primary: #FFD60A; 
            --dark: #111;
            --gray-bg: #f8f9fa;
            --border: #d1d5db;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #ffffff; /* Fondo blanco */
            margin: 0; padding: 20px;
            color: var(--dark);
            display: flex; flex-direction: column; align-items: center;
        }

        /* ZONA DE CARGA: Curvas suaves por fuera */
        .upload-zone {
            background: #fff;
            width: 100%; max-width: 800px;
            border: 2px dashed #bbb;
            border-radius: 12px; /* Redondeado amigable */
            padding: 35px 20px;
            text-align: center;
            margin-bottom: 25px;
            transition: border-color 0.2s;
            cursor: pointer;
        }

        .upload-zone:hover {
            border-color: var(--dark);
        }

        .upload-title {
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            font-size: 1.3rem;
            color: var(--dark);
            margin-bottom: 8px;
        }

        .upload-desc { font-size: 0.9rem; color: #555; }
        
        input[type="file"] { display: none; }

        .btn-upload {
            background: var(--dark); color: var(--primary);
            font-family: 'Oswald', sans-serif; font-size: 0.95rem; text-transform: uppercase;
            padding: 10px 22px; border: none; border-radius: 6px;
            margin-top: 15px; cursor: pointer;
        }
        
        .btn-upload:hover { background: #333; }

        /* TABLA DEL HORARIO: Contenedor redondeado, pero tabla estructurada */
        .schedule-container {
            width: 100%; max-width: 850px; 
            background: #fff;
            border-radius: 12px; /* Redondeado por fuera */
            border: 1px solid var(--border);
            box-shadow: 0 4px 10px rgba(0,0,0,0.03); /* Sombra súper sutil, no IA */
            overflow: hidden; /* Corta las esquinas de la tabla para que respete el borde */
            display: none; 
        }

        table { width: 100%; border-collapse: collapse; text-align: center; }
        
        th { 
            background: var(--primary); 
            color: var(--dark); 
            font-family: 'Oswald', sans-serif; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
            padding: 10px 5px; 
            font-weight: 500; 
            font-size: 0.9rem;
            border-bottom: 2px solid var(--dark); /* Da peso visual separando los días del contenido */
        }
        
        td { 
            border: 1px solid #e5e7eb; 
            padding: 6px; 
            vertical-align: top; 
            width: 16.6%; 
            height: 75px; 
        }
        
        td.time-col { 
            background: var(--gray-bg); 
            font-family: 'Oswald', sans-serif; 
            font-size: 0.8rem; 
            color: var(--dark); 
            width: 9%; 
            vertical-align: middle;
            border-right: 1px solid var(--border);
        }

        /* TARJETA DE ASIGNATURA: Práctica y semi-cuadrada */
        .class-card {
            background: #fff; 
            border: 1px solid #e5e7eb;
            border-left: 4px solid var(--primary);
            padding: 6px 8px;
            border-radius: 4px; /* Apenas redondeada, para que no sea un bloque de lego */
            display: flex;
            flex-direction: column;
            gap: 4px;
            text-align: left;
            margin-bottom: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .class-code { 
            font-weight: 600; 
            color: var(--dark); 
            font-size: 0.75rem; 
            line-height: 1.2;
        }
        
        /* ETIQUETA DE SALA: Limpia y moderna (sin fuente de programador) */
        .class-room { 
            font-size: 0.7rem; 
            color: #555; 
            font-weight: 600;
            background: var(--gray-bg); 
            padding: 2px 5px; 
            border-radius: 4px; 
            width: fit-content;
            border: 1px solid #e5e7eb;
        }

    </style>
</head>
<body>

    <label class="upload-zone" id="dropZone">
        <div class="upload-title"> Generador de Horario </div>
        <div class="upload-desc">Haz clic o arrastra tu PDF aquí para generar tu horario! </div>
        <button class="btn-upload" onclick="document.getElementById('pdfInput').click()">Seleccionar PDF</button>
        <input type="file" id="pdfInput" accept=".pdf">
    </label>

    <div class="schedule-container" id="scheduleUI">
        <table id="scheduleTable">
            <thead>
                <tr>
                    <th>Bloque</th>
                    <th>Lunes</th>
                    <th>Martes</th>
                    <th>Miércoles</th>
                    <th>Jueves</th>
                    <th>Viernes</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    const fileInput = document.getElementById('pdfInput');
    const scheduleUI = document.getElementById('scheduleUI');
    const tbody = document.querySelector('#scheduleTable tbody');

    const modulos = [
        "08:15 - 09:35", "09:50 - 11:10", "11:25 - 12:45", 
        "13:45 - 15:05", "15:20 - 16:40", "16:55 - 18:15"
    ];

    let nombresRamos = {};

    function initGrid() {
        tbody.innerHTML = '';
        modulos.forEach((mod, index) => {
            let tr = document.createElement('tr');
            tr.innerHTML = `<td class="time-col">B${index+1}<br>${mod}</td>
                            <td id="cell-0-${index}"></td>
                            <td id="cell-1-${index}"></td>
                            <td id="cell-2-${index}"></td>
                            <td id="cell-3-${index}"></td>
                            <td id="cell-4-${index}"></td>`;
            tbody.appendChild(tr);
        });
    }

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file || file.type !== 'application/pdf') {
            alert('Por favor sube un archivo PDF válido.');
            return;
        }

        initGrid(); 
        const reader = new FileReader();

        reader.onload = function(evt) {
            const typedarray = new Uint8Array(evt.target.result);
            
            pdfjsLib.getDocument(typedarray).promise.then(pdf => {
                return pdf.getPage(1);
            }).then(page => {
                return page.getTextContent();
            }).then(textContent => {
                const myClasses = procesarPDF(textContent.items);
                renderClasses(myClasses);
                
                scheduleUI.style.display = 'block'; 
                document.getElementById('dropZone').style.display = 'none'; 
            });
        };
        reader.readAsArrayBuffer(file);
    });

    function procesarPDF(items) {
        let myClasses = [];
        nombresRamos = {}; 

        let texts = items.map(i => i.str.replace(/\s+/g, ' ').trim()).filter(i => i.length > 0);
        let textoCompleto = texts.join(" ");

        let rooms = {};
        const roomRegex = /([0-9]{5}-[0-9])-([A-Z0-9\-]+?)[-\s]*Sala:\s*([A-Z0-9]+)/ig;
        let m1;
        while ((m1 = roomRegex.exec(textoCompleto)) !== null) {
            let code = m1[1];
            let coord = m1[2].replace(/-/g, ''); 
            rooms[`${code}-${coord}`] = m1[3];
        }

        let currentCode = null;
        let currentCoord = null;
        const dayMap = { 'L': 0, 'M': 1, 'W': 2, 'J': 3, 'V': 4 }; 

        for (let i = 0; i < texts.length; i++) {
            let txt = texts[i];

            let mixedMatch1 = txt.match(/^([0-9]{5}-[0-9])[\s]+(.+)$/);
            let mixedMatch2 = txt.match(/^(.+)[\s]+([0-9]{5}-[0-9])$/);
            
            if (mixedMatch1) {
                currentCode = mixedMatch1[1];
                nombresRamos[currentCode] = mixedMatch1[2].toUpperCase();
                continue;
            } else if (mixedMatch2) {
                currentCode = mixedMatch2[2];
                nombresRamos[currentCode] = mixedMatch2[1].toUpperCase();
                continue;
            }

            let codeMatch = txt.match(/^([0-9]{5}-[0-9])$/);
            if (codeMatch) {
                currentCode = codeMatch[1];
                let nextTxt = texts[i+1] || "";
                let prevTxt = texts[i-1] || "";
                
                if (nextTxt && !nextTxt.match(/^[A-Z]-[0-9]+$/) && !nextTxt.match(/^[A-Z]$/) && !nextTxt.match(/^[0-9\.-]+$/)) {
                    nombresRamos[currentCode] = nextTxt.toUpperCase();
                } else if (prevTxt && !prevTxt.match(/^[0-9]+$/)) {
                    nombresRamos[currentCode] = prevTxt.toUpperCase();
                }
                continue;
            }

            let coordMatch = txt.match(/^([A-Z]-[0-9]+)$/);
            if (coordMatch) {
                currentCoord = coordMatch[1].replace(/-/g, '');
                continue;
            }

            let scheduleMatch = txt.match(/^([LMWJV][1-9])+$/);
            if (scheduleMatch && currentCode) {
                let horario = txt;
                let room = rooms[`${currentCode}-${currentCoord}`] || "POR ASIGNAR";
                
                const horRegex = /([LMWJV])([1-9])/g;
                let hMatch;
                while ((hMatch = horRegex.exec(horario)) !== null) {
                    let dayChar = hMatch[1];
                    let blockNum = parseInt(hMatch[2]);
                    
                    if (dayMap[dayChar] !== undefined && blockNum <= modulos.length) {
                        myClasses.push({
                            day: dayMap[dayChar],
                            block: blockNum - 1, 
                            code: currentCode,
                            room: room
                        });
                    }
                }
            }
        }
        return myClasses;
    }

    function renderClasses(classesArray) {
        classesArray.forEach(cls => {
            const cell = document.getElementById(`cell-${cls.day}-${cls.block}`);
            const nombreRamo = nombresRamos[cls.code] || `CURSO ${cls.code}`; 
            
            if (cell) {
                cell.innerHTML += `
                    <div class="class-card">
                        <span class="class-code">${nombreRamo}</span>
                        <span class="class-room">${cls.room}</span>
                    </div>
                `;
            }
        });
    }
</script>

</body>
</html>
